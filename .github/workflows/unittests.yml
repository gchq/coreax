name: Tests

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - "**"

jobs:
  tests:
    strategy:
      fail-fast: false
      matrix:
        python-version:
          - "3.9"
          - "3.10"
          - "3.11"
          - "3.12"
          - "3.13"
        os:
          - ubuntu-latest
          - windows-latest
          - macos-latest
    runs-on: ${{ matrix.os }}
    env:
      # Disable implicitly syncing before running - we run an explicit sync first.
      UV_NO_SYNC: true
    steps:
    - uses: actions/checkout@v5
    - name: Set up uv
      uses: astral-sh/setup-uv@v7
      with:
        version: "latest"
        python-version: ${{ matrix.python-version }}
        enable-cache: true
    - name: Install test dependencies
      run: uv sync --extra test --no-dev --locked
    - name: Debug - uv pip freeze
      run: uv pip freeze
    # Solvers are tests separately to reduce CI memory usage.
    - name: Test solvers with pytest
      run: uv run pytest tests/unit/test_solvers.py
    # Kernels are tested separately to reduce CI memory usage..
    - name: Test kernels with pytest
      run: uv run pytest tests/unit/test_kernels.py
    - name: Test remaining units with pytest
      run: uv run pytest --ignore=tests/integration --ignore=tests/unit/test_solvers.py --ignore=tests/unit/test_kernels.py
    # Integration tests are slow, so only run if all other tests pass.
    - name: Test integration tests
      run: uv run pytest tests/integration
