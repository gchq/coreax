# Configure automatic version updates
---
version: 2
updates:
  - package-ecosystem: "github-actions"
    # Workflow files stored in the default location of `.github/workflows`; no need to
    # specify `/.github/workflows` for `directory`
    directory: "/"
    schedule:
      interval: "weekly"
    cooldown:
      default-days: 14
  - package-ecosystem: "uv"
    directory: "/"
    schedule:
      interval: "weekly"
    cooldown:
      default-days: 14
    exclude-paths:
      -  ".cspell/"
